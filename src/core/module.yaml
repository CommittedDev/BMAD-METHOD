code: core
name: "BMad Core Module"

header: "BMad Core Configuration"
subheader: "Configure the core settings for your BMad installation.\nThese settings will be used across all installed bmad skills, workflows, and agents."

user_name:
  prompt: "What should agents call you? (Use your name or a team name)"
  default: "BMad"
  result: "{value}"

communication_language:
  prompt: "What language should agents use when chatting with you?"
  default: "English"
  result: "{value}"

document_output_language:
  prompt: "Preferred document output language?"
  default: "English"
  result: "{value}"

output_folder:
  prompt: "Where should output files be saved?"
  default: "_bmad-output"
  result: "{project-root}/{value}"

tool_supports_subagents:
  prompt: "Subagents are supported by the LLM or Tool I will be using?"
  default: true
  result: "{value}"

tool_supports_agent_teams:
  prompt: "Agent Teams are supported by the LLM or Tool I will be using?"
  default: false
  result: "{value}"

execution_mode:
  prompt:
    - "What is the default execution mode for workflows?"
    - "SYNC = human reviews each step. ASYNC = agent proceeds autonomously with macro-review at end."
  default: "sync"
  result: "{value}"
  single-select:
    - value: "sync"
      label: "SYNC - Human-in-the-loop review at each step"
    - value: "async"
      label: "ASYNC - Agent-delegated with macro-review at completion"
    - value: "adaptive"
      label: "Adaptive - Agent chooses based on task complexity"
